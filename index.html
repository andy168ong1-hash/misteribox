<!DOCTYPE html> 
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Box Promo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color:white;
  text-align:center;
}
.container {
  padding:50px 20px;
}
h1 {
  font-size:40px;
  background: linear-gradient(45deg, gold, orange);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  font-size:18px;
  margin-bottom:30px;
}
.box {
  width:220px;
  animation: float 2s infinite ease-in-out;
}
@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0); }
}
.btn {
  display:inline-block;
  margin-top:20px;
  padding:15px 35px;
  font-size:20px;
  border-radius:12px;
  background: linear-gradient(45deg, gold, orange);
  color:black;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 0 20px rgba(255,215,0,0.6);
}
.btn:hover {
  transform: scale(1.05);
}
.features {
  margin-top:40px;
  font-size:16px;
}
.steps {
  margin-top:40px;
}
.urgency {
  margin-top:30px;
  color:red;
  font-weight:bold;
  font-size:18px;
  animation: blink 1s infinite;
}
@keyframes blink {
  50% { opacity:0.3; }
}
.footer {
  margin-top:50px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>
<div class="container">
  <h1>🎁 FREE MYSTERY BOX</h1>
  <p class="subtitle">Kesempatan dapat saldo hingga Rp1.000.000 untuk pengguna baru!</p>

  <img src="https://cdn-icons-png.flaticon.com/512/869/869636.png" class="box">

  <br>
  <a href="https://pagcornice.com/" class="btn">KLAIM SEKARANG</a>
  <div class="steps">
    <h3>Cara Mendapatkan:</h3>
    <p>1. Klik tombol klaim</p>
    <p>2. Daftar akun</p>
    <p>3. Buka mystery box</p>
  </div>

  <div class="urgency">⏰ Sisa slot: 23 user hari ini!</div>

  <a href="https://pagcornice.com/" class="btn">AMBIL HADIAH SEKARANG</a>

  <div class="footer">
    *Promo terbatas. Syarat & ketentuan berlaku
  </div>
</div>
</body>
</html>
